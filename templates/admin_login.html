{% extends "base.html" %}
{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div style="background: white; border-radius: 24px; padding: 40px; max-width: 440px; width: 100%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);">
        <div style="text-align: center; margin-bottom: 32px;">
            <div style="width: 64px; height: 64px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <i class="fas fa-shield-alt" style="font-size: 32px; color: white;"></i>
            </div>
            <h1 style="font-size: 28px; font-weight: 700; color: #1a202c;">Admin Access</h1>
            <p style="color: #718096;">Enter your credentials to continue</p>
        </div>
        <form method="POST">
            <div style="margin-bottom: 24px;">
                <label style="display: block; font-size: 14px; font-weight: 500; color: #4a5568; margin-bottom: 8px;">
                    <i class="fas fa-lock"></i> Password
                </label>
                <input type="password" name="password" required style="width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px;">
            </div>
            <button type="submit" style="width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;">
                <i class="fas fa-sign-in-alt"></i> Access Dashboard
            </button>
        </form>
    </div>
</div>
{% endblock %}
