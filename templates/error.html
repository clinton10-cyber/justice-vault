{% extends "base.html" %}
{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div style="background: white; border-radius: 32px; padding: 48px; text-align: center; max-width: 500px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);">
        <i class="fas fa-exclamation-triangle" style="font-size: 64px; color: #f56565;"></i>
        <h1 style="margin: 20px 0; font-size: 28px;">Oops! Something went wrong</h1>
        <p style="color: #718096; margin-bottom: 20px;">{{ error_message if error_message else 'An unexpected error occurred. Please try again later.' }}</p>
        <a href="{{ url_for('index') }}" style="display: inline-block; padding: 12px 24px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-radius: 10px; text-decoration: none;">Go Home</a>
    </div>
</div>
{% endblock %}
