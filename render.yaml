services:
  - type: web
    name: justice-vault
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -c gunicorn.conf.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
    scaling:
      minInstances: 1
      maxInstances: 2
    healthCheckPath: /health/simple
